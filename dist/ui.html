<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Analysis Plugin</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 100%;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            margin: 10px 0;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }

        button {
            background-color: #18A0FB;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: #1490E4;
        }

        #errorMessage, #successMessage {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 4px;
            display: none;
        }

        #errorMessage {
            background-color: #FFF1F0;
            color: #F24822;
            border: 1px solid #F24822;
        }

        #successMessage {
            background-color: #F6FFED;
            color: #14AE5C;
            border: 1px solid #14AE5C;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Research Analysis</h2>
        
        <div>
            <label for="contextInfo">Enter your research notes:</label>
            <textarea id="contextInfo" placeholder="Paste your research text here..."></textarea>
        </div>

        <button id="analyzeWithAI">Analyze with AI</button>

        <div id="errorMessage"></div>
        <div id="successMessage"></div>
    </div>

    <script src="ui.js"></script>
</body>
</html>
