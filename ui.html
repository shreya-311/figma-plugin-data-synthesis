<!DOCTYPE html>
<html>
<head>
    <title>Data Synthesis Helper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="input-section">
            <h2>Data Input</h2>
            <div class="file-upload">
                <label for="fileUpload">Upload Files (PDF, Images, CSV, etc.)</label>
                <input type="file" id="fileUpload" multiple accept=".pdf,.jpg,.jpeg,.png,.csv,.txt,.mp3,.mp4">
            </div>
            
            <div class="text-input">
                <label for="contextInfo">Session Context</label>
                <textarea id="contextInfo" placeholder="Enter session context, demographics, etc."></textarea>
            </div>

            <div class="data-type-selector">
                <label>Data Type:</label>
                <select id="dataType">
                    <option value="interview">Interview</option>
                    <option value="survey">Survey</option>
                    <option value="observation">Observation</option>
                </select>
            </div>

            <div>
                <textarea id="researchText" rows="10" cols="50" placeholder="Paste your research notes here..."></textarea>
                <button id="analyzeButton">Analyze with AI</button>
                <div id="results" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div class="visualization-section">
            <h2>Visualizations</h2>
            <div class="viz-controls">
                <button id="generateThemes">Generate Themes</button>
                <button id="createWordCloud">Create Word Cloud</button>
                <button id="showJourneyMap">Show Journey Map</button>
                <button id="showSentiments">Show Sentiments</button>
            </div>
            <div id="visualizationArea"></div>
        </div>

        <div class="action-buttons">
            <button id="createArtboard">Create Artboard</button>
            <button id="processData">Process Data</button>
        </div>
    </div>
    <script src="ui.js"></script>
    <script>
    // Add immediate console log to check if script runs
    console.log('Script loaded');

    document.getElementById('analyzeButton').onclick = async () => {
        // Add console log to check if button click works
        console.log('Button clicked');
        console.log('Text value:', document.getElementById('researchText').value);

        const text = document.getElementById('researchText').value;
        const resultsDiv = document.getElementById('results');
        
        // Show loading state
        resultsDiv.innerHTML = 'Analyzing...';
        
        try {
            console.log('Making fetch request...');
            const response = await fetch('https://80cc-2607-fea8-9356-2200-99ad-8976-aa98-4639.ngrok-free.app/analyze', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text })
            });
            console.log('Fetch response received:', response);

            const data = await response.json();
            console.log('Parsed response data:', data);
            
            if (data.error) {
                resultsDiv.innerHTML = `<p style="color: red;">Error: ${data.error}</p>`;
                return;
            }

            // Display themes in a formatted list
            const themesList = data.themes
                .map(theme => `<li>${theme}</li>`)
                .join('');
            
            resultsDiv.innerHTML = `
                <h3>Analysis Results:</h3>
                <ul>${themesList}</ul>
            `;
        } catch (error) {
            console.error('Detailed error:', error);
            resultsDiv.innerHTML = `
                <p style="color: red;">
                    Error connecting to server. Check the console for details.
                </p>
            `;
        }
    };
    </script>
</body>
</html>
